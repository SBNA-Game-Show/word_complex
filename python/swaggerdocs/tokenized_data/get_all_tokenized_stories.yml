Get all tokenized stories
---
tags:
  - Tokenized Data Routes

summary: Retrieve all tokenized stories

description: >
  Returns all tokenized stories that have been downloaded and tokenized from MongoDB

responses:
  200:
    description: Tokenized stories retrieved successfully
    schema:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            type: object

  404:
    description: No Stories in DB
    schema:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            type: object

  500:
    description: Internal server error.
    schema:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Internal server error
